<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Clinics | HealthFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-gradient { background: #0f172a; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.05); }
        .app-bg {
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .status-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>

<body class="app-bg text-slate-900 overflow-x-hidden">
    <input type="hidden" id="profId" th:value="${doctorId}">

    <aside class="sidebar-gradient fixed left-0 top-0 h-screen w-64 text-white shadow-2xl z-50">
        <div class="p-6 text-center border-b border-slate-700/50">
            <h2 class="text-xl font-bold tracking-wider text-blue-400">HEALTHFLOW <span class="text-white">PRO</span></h2>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1 font-semibold">Doctor Portal</p>
        </div>
        
        <nav class="mt-6 px-4 space-y-1">
            <a th:href="@{/doctordb}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl bg-blue-600 text-white cursor-pointer shadow-lg shadow-blue-900/20">
                <i class="fas fa-chart-line mr-3"></i> Analytics
            </a>
            <div class="pt-6 pb-2 text-[10px] font-bold text-slate-500 uppercase px-4 tracking-[2px]">Management</div>
            <a th:href="@{/clinicinfo}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-hospital mr-3 text-blue-400"></i> My Clinics
            </a>
            <a th:href="@{/patientinfo}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-users mr-3 text-blue-400"></i> Patient List
            </a>
            <a th:href="@{/medical-tests-dashboard}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-flask mr-3 text-blue-400"></i> Laboratory
            </a>
            <a th:href="@{/inventory}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-pills mr-3 text-blue-400"></i> Pharmacy
            </a>
            <div class="pt-6 pb-2 text-[10px] font-bold text-slate-500 uppercase px-4 tracking-[2px]">Settings</div>
            <a th:href="@{/my-profile}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-user-circle mr-3 text-blue-400"></i> Profile
            </a>
        </nav>
    </aside>

    <main class="ml-64 p-8 min-h-screen">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">My Registered Clinics</h1>
                <p class="text-slate-500 text-xs mt-1">Manage your active practice locations and facilities.</p>
            </div>
            <button onclick="location.href='/add-clinic'" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold text-xs transition-all shadow-lg shadow-blue-200">
                <i class="fas fa-plus mr-2"></i> REGISTER NEW CLINIC
            </button>
        </header>

        <div id="clinicGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full py-20 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
                <p class="mt-4 text-slate-400 font-medium">Fetching your clinics...</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const doctorId = document.getElementById("profId")?.value;

            if (!doctorId) {
                document.getElementById("clinicGrid").innerHTML = `
                    <div class="col-span-full bg-red-50 text-red-600 p-6 rounded-2xl border border-red-100 text-center">
                        <i class="fas fa-exclamation-circle mb-2 text-2xl"></i>
                        <p class="font-bold">Session Expired</p>
                        <p class="text-xs">Please log in again to view your clinics.</p>
                    </div>
                `;
                return;
            }

            fetchClinics(doctorId);
        });

        async function fetchClinics(id) {
            try {
                // ✅ Using the ownership-specific endpoint
                const response = await fetch(`/api/clinics/my-clinics/${id}`);
                const clinics = await response.json();
                
                const grid = document.getElementById("clinicGrid");

                if (clinics.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full py-20 text-center bg-white rounded-3xl border-2 border-dashed border-slate-200">
                            <i class="fas fa-hospital-alt text-4xl text-slate-200 mb-4"></i>
                            <p class="text-slate-500 font-medium">No clinics found under your profile.</p>
                            <button onclick="location.href='/add-clinic'" class="mt-4 text-blue-600 font-bold text-sm hover:underline">Register your first clinic now</button>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = clinics.map(clinic => `
                    <div class="glass-card p-6 rounded-3xl relative overflow-hidden group">
                        <div class="absolute top-0 right-0 p-4">
                            <span class="status-badge px-2 py-1 rounded-lg ${clinic.status === 'ACTIVE' ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-500'}">
                                ${clinic.status || 'ACTIVE'}
                            </span>
                        </div>
                        
                        <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 mb-5 group-hover:bg-blue-600 group-hover:text-white transition-all">
                            <i class="fas fa-hospital text-xl"></i>
                        </div>

                        <h3 class="text-lg font-bold text-slate-800 mb-1 line-clamp-1">${clinic.clinicName}</h3>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">${clinic.clinicId}</p>

                        <div class="space-y-3 pt-4 border-t border-slate-100">
                            <div class="flex items-start text-xs text-slate-500">
                                <i class="fas fa-map-marker-alt w-5 mt-0.5 text-blue-400"></i>
                                <span>${clinic.address.city}, ${clinic.address.state} - ${clinic.address.pincode}</span>
                            </div>
                            <div class="flex items-center text-xs text-slate-500">
                                <i class="fas fa-phone w-5 text-blue-400"></i>
                                <span>${clinic.contact.phone}</span>
                            </div>
                            <div class="flex items-center text-xs text-slate-500">
                                <i class="fas fa-clock w-5 text-blue-400"></i>
                                <span>${clinic.openingTime || 'N/A'} - ${clinic.closingTime || 'N/A'}</span>
                            </div>
                        </div>

                        <div class="mt-6 flex gap-2">
                            <button onclick="location.href='/clinic-details?id=${clinic.clinicId}'" class="flex-1 bg-slate-50 hover:bg-blue-50 text-slate-600 hover:text-blue-600 py-2 rounded-xl text-[10px] font-bold uppercase transition-all">
                                View Details
                            </button>
                            <button class="px-4 bg-slate-50 hover:bg-red-50 text-slate-400 hover:text-red-500 py-2 rounded-xl transition-all">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error("Error fetching clinics:", error);
                document.getElementById("clinicGrid").innerHTML = `<p class="text-red-500 text-center col-span-full">Failed to load clinics.</p>`;
            }
        }
    </script>
</body>

</html>
