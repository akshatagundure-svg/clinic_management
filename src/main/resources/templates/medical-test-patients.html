<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Test Management | HealthFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-gradient { background: #0f172a; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; }
        .app-bg {
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="app-bg text-slate-900 overflow-x-hidden">

    <input type="hidden" id="profId" th:value="${doctorId}">

    <aside class="sidebar-gradient fixed left-0 top-0 h-screen w-64 text-white shadow-2xl z-50">
        <div class="p-6 text-center border-b border-slate-700/50">
            <h2 class="text-xl font-bold tracking-wider text-blue-400">HEALTHFLOW <span class="text-white">PRO</span></h2>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1 font-semibold">Doctor Portal</p>
        </div>
        
        <nav class="mt-6 px-4 space-y-1">
            <a th:href="@{/doctordb}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl bg-blue-600 text-white cursor-pointer shadow-lg shadow-blue-900/20">
                <i class="fas fa-chart-line mr-3"></i> Analytics
            </a>
            <div class="pt-6 pb-2 text-[10px] font-bold text-slate-500 uppercase px-4 tracking-[2px]">Management</div>
            <a th:href="@{/clinicinfo}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-hospital mr-3 text-blue-400"></i> My Clinics
            </a>
            <a th:href="@{/patientinfo}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-users mr-3 text-blue-400"></i> Patient List
            </a>
            <a th:href="@{/medical-tests-dashboard}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl bg-blue-600 text-white shadow-lg transition-all group">
                <i class="fas fa-flask mr-3"></i> Laboratory
            </a>
            <a th:href="@{/inventory}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-pills mr-3 text-blue-400"></i> Pharmacy
            </a>
            <div class="pt-6 pb-2 text-[10px] font-bold text-slate-500 uppercase px-4 tracking-[2px]">Settings</div>
            <a th:href="@{/my-profile}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-user-circle mr-3 text-blue-400"></i> Profile
            </a>
        </nav>
    </aside>

    <main class="ml-64 p-8 min-h-screen">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Laboratory Services</h1>
                <p class="text-slate-500 text-xs mt-1">Select a patient to manage medical investigations</p>
            </div>
            <button onclick="location.href='/doctordb'" class="bg-blue-50 hover:bg-blue-100 text-blue-600 px-4 py-2 rounded-xl font-bold text-xs transition-all">
                BACK TO DASHBOARD
            </button>
        </header>

        <div class="glass-card bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm max-w-5xl mx-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-100">
                    <tr>
                        <th class="px-8 py-4">Patient Name</th>
                        <th class="px-8 py-4">Patient ID</th>
                        <th class="px-8 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="patientListBody" class="divide-y divide-slate-100">
                    <tr>
                        <td colspan="3" class="px-8 py-10 text-center text-slate-400">
                            <i class="fas fa-circle-notch fa-spin mr-2"></i> Loading patient data...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const doctorId = document.getElementById('profId').value;
            
            try {
                // Fetch patients under this doctor
                const response = await fetch(`/api/patients/doctor/${doctorId}`);
                if (!response.ok) throw new Error("Failed to fetch patients");
                const patients = await response.json();
                
                const body = document.getElementById('patientListBody');
                
                if (patients.length === 0) {
                    body.innerHTML = `<tr><td colspan="3" class="px-8 py-10 text-center text-slate-500">No patients found assigned to your profile.</td></tr>`;
                    return;
                }

                body.innerHTML = patients.map(p => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-8 py-5">
                            <div class="font-bold text-slate-700">${p.fullName}</div>
                        </td>
                        <td class="px-8 py-5">
                            <span class="text-xs font-mono bg-slate-100 text-slate-600 px-2 py-1 rounded">${p.patientId}</span>
                        </td>
                        <td class="px-8 py-5 text-right space-x-2">
                            <button onclick="location.href='/add-medical-test?patientId=${p.patientId}'" 
                                    class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-600 hover:text-white transition-all">
                                <i class="fas fa-plus mr-2"></i> ADD TEST
                            </button>
                            <button onclick="location.href='/view-patient-tests?patientId=${p.patientId}'" 
                                    class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-slate-800 hover:text-white transition-all">
                                <i class="fas fa-eye mr-2"></i> VIEW TESTS
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('patientListBody').innerHTML = `<tr><td colspan="3" class="px-8 py-10 text-center text-red-500 font-bold">Error loading patients.</td></tr>`;
            }
        });
    </script>
</body>
</html>
