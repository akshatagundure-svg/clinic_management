<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescription Detail | HealthFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-gradient { background: #0f172a; }
        .detail-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; }
        .section-header { border-left: 4px solid #3b82f6; padding-left: 1rem; margin-bottom: 1.5rem; }
        .app-bg { background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px); background-size: 24px 24px; }
        
        @media print {
            .no-print { display: none !important; }
            main { margin-left: 0 !important; }
            .detail-card { border: none !important; }
        }
    </style>
</head>
<body class="app-bg text-slate-900 overflow-x-hidden">

    <input type="hidden" id="targetPrescriptionId" th:value="${prescriptionId}">
    <input type="hidden" id="sessPatientId" th:value="${patientId}">

     <aside class="sidebar-gradient fixed left-0 top-0 h-screen w-64 text-white z-50">
        <div class="p-6 text-center border-b border-slate-700/50">
            <h2 class="text-xl font-bold text-blue-400">HEALTHFLOW <span class="text-white">PRO</span></h2>
        </div>
        <nav class="mt-6 px-4 space-y-2">
    <button onclick="location.href='/patient/clinics'" class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all">
        <i class="fas fa-hospital mr-3 text-blue-400"></i> Clinics
    </button>
    
    <button onclick="location.href='/patient/doctors'" class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all">
        <i class="fas fa-user-md mr-3 text-blue-400"></i> Doctors
    </button>
    
    <button onclick="location.href='/patient/my-prescriptions'" class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all">
        <i class="fas fa-file-prescription mr-3 text-blue-400"></i> Prescriptions
    </button>

    <button onclick="location.href='/patient-dashboard?tab=tests'" class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all">
        <i class="fas fa-microscope mr-3 text-blue-400"></i> Lab Tests
    </button>
</nav>
    </aside>

    <main class="ml-64 p-6 md:p-12 min-h-screen">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-8 no-print">
                <button onclick="history.back()" class="text-slate-400 hover:text-blue-600 font-bold text-xs">
                    <i class="fas fa-arrow-left mr-2"></i> BACK TO LIST
                </button>
                <button onclick="downloadPDF()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-xs shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                    <i class="fas fa-download mr-2"></i> DOWNLOAD PDF
                </button>
            </div>

            <div id="pdfWrapper" class="space-y-8 p-4">
                <div class="detail-card p-10 shadow-sm relative overflow-hidden">
                    <div class="flex justify-between items-start border-b border-slate-100 pb-8 mb-8">
                        <div>
                            <h1 id="diagConfirmed" class="text-3xl font-black text-slate-800 tracking-tight">---</h1>
                            <p id="prescIdDisplay" class="text-xs font-mono text-blue-500 font-bold mt-2 uppercase tracking-widest"></p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Consulting Doctor</p>
                            <p id="docName" class="text-lg font-bold text-slate-800">---</p>
                            <p id="docSpec" class="text-xs text-blue-500 font-bold uppercase"></p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-8 mb-10">
                        <div>
                            <div class="section-header"><h3 class="text-[10px] font-bold text-slate-400 uppercase">Provisional Diagnosis</h3></div>
                            <p id="diagProv" class="text-sm text-slate-600 italic"></p>
                            <p id="diagSeverity" class="text-[10px] font-bold text-red-500 uppercase mt-2"></p>
                        </div>
                        <div>
                            <div class="section-header"><h3 class="text-[10px] font-bold text-slate-400 uppercase">Treatment Timeline</h3></div>
                            <p class="text-xs text-slate-600">Start: <span id="timeStart" class="font-bold">--</span></p>
                            <p class="text-xs text-slate-600">End: <span id="timeEnd" class="font-bold">--</span></p>
                            <span id="timeStatus" class="mt-2 inline-block px-2 py-0.5 rounded text-[9px] font-bold bg-emerald-50 text-emerald-600 uppercase">---</span>
                        </div>
                    </div>

                    <div class="mb-10">
                        <div class="section-header"><h3 class="text-sm font-bold text-slate-800 uppercase">Prescribed Medications</h3></div>
                        <div id="medList" class="space-y-3"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-8 mb-10">
                        <div>
                            <div class="section-header"><h3 class="text-sm font-bold text-slate-800 uppercase">Procedures</h3></div>
                            <div id="procList" class="space-y-2"></div>
                        </div>
                        <div>
                            <div class="section-header"><h3 class="text-sm font-bold text-slate-800 uppercase">Lab Investigations</h3></div>
                            <div id="testList" class="space-y-2"></div>
                        </div>
                    </div>

                    <div class="bg-blue-600 p-8 rounded-3xl text-white flex justify-between items-center mb-10">
                        <div>
                            <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest">Next Appointment</p>
                            <p id="followUpDate" class="text-xl font-bold">---</p>
                        </div>
                        <div class="text-right max-w-[200px]">
                            <p class="text-[10px] font-bold opacity-70 uppercase">Doctor's Notes</p>
                            <p id="followUpNotes" class="text-xs italic truncate-3-lines">---</p>
                        </div>
                    </div>

                    <div class="flex justify-end mt-12">
                        <div class="text-center w-48">
                            <div class="border-b border-slate-300 mb-2 h-12 flex items-end justify-center">
                                <span class="text-xs font-mono text-slate-400 italic">Digitally Signed</span>
                            </div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Authorized Signature</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="loader" class="text-center py-20">
                <i class="fas fa-spinner animate-spin text-4xl text-blue-500"></i>
            </div>
        </div>
    </main>

    <script th:inline="javascript">
        const rxId = document.getElementById('targetPrescriptionId').value;

        async function loadDetails() {
            try {
                const res = await fetch(`/api/prescriptions/${rxId}`);
                if (!res.ok) throw new Error("Not found");
                const p = await res.json();

                // 1. Basic Info & Diagnosis
                document.getElementById('diagConfirmed').innerText = p.diagnosis?.confirmedDiagnosis || "General Consultation";
                document.getElementById('prescIdDisplay').innerText = p.prescriptionId;
                document.getElementById('docName').innerText = "Dr. " + (p.currentDoctor?.fullName || "Specialist");
                document.getElementById('docSpec').innerText = p.currentDoctor?.specialization || "";
                document.getElementById('diagProv').innerText = p.diagnosis?.provisionalDiagnosis || "N/A";
                document.getElementById('diagSeverity').innerText = "Severity: " + (p.diagnosis?.severity || "Normal");

                // 2. Timeline
                document.getElementById('timeStart').innerText = p.treatmentTimeline?.treatmentStartDate ? new Date(p.treatmentTimeline.treatmentStartDate).toLocaleDateString() : "--";
                document.getElementById('timeEnd').innerText = p.treatmentTimeline?.expectedCompletionDate ? new Date(p.treatmentTimeline.expectedCompletionDate).toLocaleDateString() : "--";
                document.getElementById('timeStatus').innerText = p.treatmentTimeline?.treatmentStatus || "Ongoing";

                // 3. Medications
                const meds = p.medications || [];
                document.getElementById('medList').innerHTML = meds.map(m => `
                    <div class="flex justify-between p-4 bg-slate-50 border border-slate-100 rounded-2xl shadow-sm">
                        <div>
                            <p class="font-bold text-slate-800">${m.medicineName}</p>
                            <p class="text-[10px] text-slate-500 font-bold">${m.dosage} — ${m.frequency}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-blue-500 font-bold uppercase tracking-widest">${m.route || 'Oral'}</p>
                            <p class="text-[10px] text-slate-400 italic">${m.instructions || ''}</p>
                        </div>
                    </div>
                `).join('') || '<p class="text-slate-400 text-xs">No medications listed.</p>';

                // 4. Procedures
                document.getElementById('procList').innerHTML = p.procedures?.map(pr => `
                    <div class="p-3 bg-white border border-slate-100 rounded-xl mb-2 flex justify-between">
                        <span class="text-xs font-bold text-slate-700">${pr.procedureName}</span>
                        <span class="text-[9px] font-bold text-slate-400">${pr.sessions || 1} Sessions</span>
                    </div>
                `).join('') || '<p class="text-slate-300 text-[10px] italic">None advised.</p>';

                // 5. Investigations
                document.getElementById('testList').innerHTML = p.investigations?.map(i => `
                    <div class="p-3 bg-white border border-slate-100 rounded-xl mb-2 flex justify-between">
                        <span class="text-xs font-bold text-slate-700">${i.testName}</span>
                        <i class="fas fa-microscope text-blue-200 text-xs"></i>
                    </div>
                `).join('') || '<p class="text-slate-300 text-[10px] italic">None advised.</p>';

                // 6. Follow Up
                document.getElementById('followUpDate').innerText = p.followUp?.followUpDate ? 
                    new Date(p.followUp.followUpDate).toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' }) : "No follow-up required";
                document.getElementById('followUpNotes').innerText = p.followUp?.notes || "Take rest and follow medications.";

                document.getElementById('loader').classList.add('hidden');
            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = `<p class="text-red-500">Error loading record.</p>`;
            }
        }

        function downloadPDF() {
            const element = document.getElementById('pdfWrapper');
            const opt = {
                margin: 10,
                filename: `Medical_Report_${rxId}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        loadDetails();
    </script>
</body>
</html>
