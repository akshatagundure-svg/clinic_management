<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical History | HealthFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .sidebar-gradient { background: #0f172a; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; }
        .app-bg {
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="app-bg text-slate-900 overflow-x-hidden">

    <input type="hidden" id="doctorId" th:value="${doctorId}">
    <input type="hidden" id="patientId" th:value="${patientId}">

   <aside class="sidebar-gradient fixed left-0 top-0 h-screen w-64 text-white shadow-2xl z-50">
        <div class="p-6 text-center border-b border-slate-700/50">
            <h2 class="text-xl font-bold tracking-wider text-blue-400">HEALTHFLOW <span class="text-white">PRO</span></h2>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1 font-semibold">Doctor Portal</p>
        </div>
        
        <nav class="mt-6 px-4 space-y-1">
            <a th:href="@{/doctordb}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl bg-blue-600 text-white cursor-pointer shadow-lg shadow-blue-900/20">
                <i class="fas fa-chart-line mr-3"></i> Analytics
            </a>
            <div class="pt-6 pb-2 text-[10px] font-bold text-slate-500 uppercase px-4 tracking-[2px]">Management</div>
            <a th:href="@{/clinicinfo}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-hospital mr-3 text-blue-400"></i> My Clinics
            </a>
            <a th:href="@{/patientinfo}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-users mr-3 text-blue-400"></i> Patient List
            </a>
            <a th:href="@{/medical-tests-dashboard}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-flask mr-3 text-blue-400"></i> Laboratory
            </a>
            <a th:href="@{/inventory}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-pills mr-3 text-blue-400"></i> Pharmacy
            </a>
            <div class="pt-6 pb-2 text-[10px] font-bold text-slate-500 uppercase px-4 tracking-[2px]">Settings</div>
            <a th:href="@{/my-profile}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-user-circle mr-3 text-blue-400"></i> Profile
            </a>
        </nav>
    </aside>

    <main class="ml-64 p-8 min-h-screen">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Prescription History</h1>
                <p class="text-slate-500 text-sm mt-1">Viewing clinical records for Patient: <span id="patIdDisplay" class="font-bold text-blue-600">...</span></p>
            </div>
            <button onclick="history.back()" class="bg-slate-100 text-slate-600 px-5 py-2 rounded-xl font-bold text-xs hover:bg-slate-200 transition-all">
                <i class="fas fa-arrow-left mr-2"></i> BACK
            </button>
        </header>

        <div id="historyContainer" class="space-y-6">
            <div id="loader" class="p-20 text-center text-slate-400">
                <i class="fas fa-circle-notch fa-spin text-2xl mb-2 text-blue-500"></i>
                <p>Loading medical history...</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const patientId = document.getElementById('patientId').value;
            const doctorId = document.getElementById('doctorId').value;
            const container = document.getElementById('historyContainer');
            
            document.getElementById('patIdDisplay').innerText = patientId;

            try {
                // Fetch prescriptions for this specific patient
                const response = await fetch(`/api/prescriptions/patient/${patientId}`);
                if (!response.ok) throw new Error("Failed to fetch records");
                
                const data = await response.json();
                
                // Filter locally for this doctor to match your security preference
                const filtered = data.filter(p => p.currentDoctor && p.currentDoctor.doctorId === doctorId);

                if (filtered.length === 0) {
                    container.innerHTML = `
                        <div class="glass-card p-16 rounded-3xl text-center text-slate-400">
                            <i class="fas fa-folder-open text-4xl mb-4 text-slate-200"></i>
                            <p class="font-medium">No records found from your clinic for this patient.</p>
                        </div>`;
                    return;
                }

                // Render prescriptions in reverse chronological order
                container.innerHTML = filtered.reverse().map(p => {
                    const date = p.audit?.createdAt ? new Date(p.audit.createdAt).toLocaleDateString() : 'N/A';
                    
                    return `
                    <div class="glass-card p-8 rounded-3xl shadow-sm relative overflow-hidden border-l-4 border-blue-500 hover:shadow-md transition-all">
                        <div class="flex justify-between mb-6">
                            <div>
                                <span class="text-[10px] font-extrabold text-blue-500 uppercase tracking-widest">Prescription ID: ${p.id}</span>
                                <h3 class="text-xl font-bold text-slate-800 mt-1">
                                    ${p.diagnosis ? p.diagnosis.confirmedDiagnosis : 'General Consultation'}
                                </h3>
                            </div>
                            <div class="text-right">
                                <span class="px-3 py-1 bg-green-50 text-green-600 rounded-full text-[10px] font-bold uppercase">
                                    ${p.recordStatus || 'Active'}
                                </span>
                                <p class="text-[10px] text-slate-400 font-bold mt-2 uppercase tracking-tighter">${date}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">Medications Assigned</p>
                                <ul class="space-y-2">
                                    ${p.medications.map(m => `
                                        <li class="text-sm text-slate-700 flex items-start">
                                            <i class="fas fa-pills text-blue-400 mt-1 mr-3 text-xs"></i>
                                            <span><b class="text-slate-900">${m.medicineName}</b> - ${m.dosage} (${m.frequency})</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                            <div class="border-l border-slate-200 pl-6">
                                <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">Clinical Summary</p>
                                <p class="text-sm text-slate-600 leading-relaxed">
                                    Patient presented with <b>${p.diagnosis?.severity || 'Normal'}</b> severity condition. 
                                    Treatment started on <b>${p.treatmentTimeline?.treatmentStartDate ? new Date(p.treatmentTimeline.treatmentStartDate).toLocaleDateString() : 'N/A'}</b>.
                                </p>
                            </div>
                        </div>
                        
                        <div class="mt-6 flex justify-end">
                             <button onclick="window.location.href='/view-prescription/${p.id}'" 
                                     class="text-[10px] font-bold text-blue-600 uppercase hover:text-blue-800 transition-all">
                                View Full Clinical Report <i class="fas fa-chevron-right ml-1"></i>
                             </button>
                        </div>
                    </div>
                `}).join('');
            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="text-red-500 text-center">Failed to load clinical history. Please verify API connection.</p>`;
            }
        });
    </script>
</body>
</html>
