<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Doctors | HealthFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }

        .sidebar-gradient {
            background: #0f172a;
        }

        .glass-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            border-color: #3b82f6;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .app-bg {
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
    </style>
</head>

<body class="app-bg text-slate-900 overflow-x-hidden">
    <input type="hidden" id="sessPatientId" th:value="${session.patientId}">

    <aside class="sidebar-gradient fixed left-0 top-0 h-screen w-64 text-white z-50">
        <div class="p-6 text-center border-b border-slate-700/50">
            <h2 class="text-xl font-bold text-blue-400">HEALTHFLOW <span class="text-white">PRO</span></h2>
        </div>
        <nav class="mt-6 px-4 space-y-2">
            <button onclick="location.href='/patient/clinics'"
                class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all">
                <i class="fas fa-hospital mr-3 text-blue-400"></i> Clinics
            </button>

            <button onclick="location.href='/patient/doctors'"
                class="w-full flex items-center px-4 py-3 text-sm rounded-xl bg-blue-600/20 text-blue-400 transition-all">
                <i class="fas fa-user-md mr-3 text-blue-400"></i> Doctors
            </button>

            <button onclick="switchTab('prescriptions')"
                class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all">
                <i class="fas fa-file-prescription mr-3 text-blue-400"></i> Prescriptions
            </button>

            <button onclick="location.href='/patient/my-lab-tests?patientId=' + document.getElementById('sessPatientId').value"
                class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all">
                <i class="fas fa-microscope mr-3 text-blue-400"></i> Lab Tests
            </button>
        </nav>
    </aside>

    <main class="ml-64 p-10 min-h-screen">
        <header
            class="flex justify-between items-center mb-10 bg-white p-6 rounded-2xl shadow-sm border border-slate-200/50">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Find Specialists</h1>
                <p class="text-slate-400 text-sm mt-1">Browse our network of qualified medical professionals.</p>
            </div>
            <button onclick="location.href='/patient-dashboard'"
                class="text-slate-500 hover:text-blue-600 font-bold text-xs tracking-widest transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> DASHBOARD
            </button>
        </header>

        <div id="doctorGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20">
                <i class="fas fa-spinner animate-spin text-4xl text-blue-500"></i>
                <p class="mt-4 text-slate-500 font-medium">Retrieving medical experts...</p>
            </div>
        </div>
    </main>

    <script>
        const pId = document.getElementById('sessPatientId').value;

        // ✅ Updated switchTab to handle absolute paths correctly
        function switchTab(type) {
            if (type === 'prescriptions') {
                location.href = `/patient/my-prescriptions?patientId=${pId}`;
            }
            else if (type === 'clinics') {
                location.href = '/patient/clinics';
            } else if (type === 'doctors') {
                location.href = '/patient/doctors';
            }
        }

        async function loadDoctors() {
            try {
                // Fetch doctors from your REST API
                const res = await fetch('/api/doctors');
                if (!res.ok) throw new Error("API error");
                const data = await res.json();

                const grid = document.getElementById('doctorGrid');
                if (!data || data.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-20 bg-white rounded-3xl border border-slate-200">
                            <i class="fas fa-user-slash text-slate-200 text-5xl mb-4"></i>
                            <p class="text-slate-500 font-medium">No doctors available at the moment.</p>
                        </div>`;
                    return;
                }

                grid.innerHTML = data.map(d => {
                    const docName = d.name || "Specialist";
                    const initial = docName.charAt(0).toUpperCase();

                    return `
                        <div class="glass-card p-8 rounded-[2.5rem] flex flex-col border border-slate-100" onclick="location.href='/patient/doctor-details/${d.doctorId}'">
                            <div class="flex items-center mb-6">
                                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-2xl font-black shadow-sm">
                                    ${initial}
                                </div>
                                <div class="ml-5">
                                    <h3 class="font-bold text-slate-800 text-lg leading-tight">Dr. ${docName}</h3>
                                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-[0.15em] mt-1">${d.specialization || 'Consultant'}</p>
                                </div>
                            </div>
                            
                            <div class="space-y-3 mb-8">
                                <div class="flex items-center text-xs text-slate-500">
                                    <i class="fas fa-briefcase w-5 text-blue-300"></i>
                                    <span><b class="text-slate-700">${d.experience || 0}</b> Years Experience</span>
                                </div>
                                <div class="flex items-center text-xs text-slate-500">
                                    <i class="fas fa-graduation-cap w-5 text-blue-300"></i>
                                    <span>${d.qualification || 'MD / MBBS'}</span>
                                </div>
                            </div>

                            <div class="mt-auto pt-6 border-t border-slate-50 flex items-center justify-between group">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Available for Booking</span>
                                <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-all">
                                    <i class="fas fa-chevron-right text-[10px]"></i>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('doctorGrid').innerHTML = `
                    <div class="col-span-full text-center py-20 text-red-500">
                        <i class="fas fa-exclamation-triangle text-3xl mb-2"></i>
                        <p class="font-bold">Error connecting to the expert database.</p>
                    </div>`;
            }
        }

        loadDoctors();
    </script>
    <a href="/ai" target="_blank" class="fixed bottom-8 right-8 w-16 h-16 rounded-full bg-gradient-to-r from-blue-400 to-emerald-400 text-white flex items-center justify-center shadow-xl shadow-blue-500/30 hover:shadow-emerald-500/40 hover:scale-110 transition-all duration-300 z-50 group cursor-pointer border-2 border-white">
        <i class="fa-solid fa-wand-magic-sparkles text-2xl group-hover:rotate-12 transition-transform"></i>
        <span class="absolute top-0 right-0 flex h-4 w-4">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
            <span class="relative inline-flex rounded-full h-4 w-4 bg-emerald-300 border-2 border-white"></span>
        </span>
        </a>
</body>

</html>
