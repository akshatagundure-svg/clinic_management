<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Profile | HealthFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .sidebar-gradient { background: #0f172a; }
        .app-bg { background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px); background-size: 24px 24px; }
        .detail-card { background: white; border-radius: 3rem; box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); overflow: hidden; }
    </style>
</head>
<body class="app-bg text-slate-900 overflow-x-hidden">

    <input type="hidden" id="clinicId" th:value="${clinicId}">
    <input type="hidden" id="sessPatientId" th:value="${patientId}">

    <aside class="sidebar-gradient fixed left-0 top-0 h-screen w-64 text-white z-50">
        <div class="p-6 text-center border-b border-slate-700/50">
            <h2 class="text-xl font-bold text-blue-400">HEALTHFLOW <span class="text-white">PRO</span></h2>
        </div>
        <nav class="mt-6 px-4 space-y-2">
    <button onclick="location.href='/patient/clinics'" class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all">
        <i class="fas fa-hospital mr-3 text-blue-400"></i> Clinics
    </button>
    
    <button onclick="location.href='/patient/doctors'" class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all">
        <i class="fas fa-user-md mr-3 text-blue-400"></i> Doctors
    </button>
    
    <button onclick="location.href='/patient/my-prescriptions?patientId=' + document.getElementById('sessPatientId').value" class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all">
        <i class="fas fa-file-prescription mr-3 text-blue-400"></i> Prescriptions
    </button>

    <button onclick="switchTab('tests')" class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all">
        <i class="fas fa-microscope mr-3 text-blue-400"></i> Lab Tests
    </button>
</nav>
    </aside>

    <main class="ml-64 p-10 min-h-screen">
        <div class="max-w-4xl mx-auto py-10">
            <div id="detailsContainer" class="detail-card">
                <div class="p-20 text-center">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent mb-4"></div>
                    <p class="text-slate-500 font-medium tracking-tight">Retrieving Facility Profile...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const cId = document.getElementById('clinicId').value;
        const pId = document.getElementById('sessPatientId').value;

        // Navigation Helper
        function switchTab(type) {
            if (type === 'doctors') location.href = '/patient-dashboard?tab=doctors';
            else if (type === 'prescriptions') location.href = `/patient/my-prescriptions?patientId=${pId}`;
            else if (type === 'tests') location.href = '/patient-dashboard?tab=tests';
        }

        async function loadDetails() {
            try {
                const res = await fetch(`/api/clinics/${cId}`);
                if (!res.ok) throw new Error("Clinic not found");
                const c = await res.json();
                
                document.getElementById('detailsContainer').innerHTML = `
                    <div class="bg-blue-600 p-12 text-white relative overflow-hidden">
                        <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                        
                        <span class="bg-blue-400/30 backdrop-blur-md border border-white/20 text-[10px] font-bold px-4 py-1.5 rounded-full uppercase tracking-[0.2em] shadow-sm">
                            ${c.status || 'ACTIVE'}
                        </span>
                        <h1 class="text-4xl font-extrabold mt-6 tracking-tight">${c.clinicName}</h1>
                        <div class="flex items-center mt-3 text-blue-100/70 space-x-4">
                            <span class="text-xs font-bold uppercase tracking-widest">${c.clinicId}</span>
                            <span class="w-1.5 h-1.5 bg-blue-300 rounded-full"></span>
                            <span class="text-xs font-bold uppercase tracking-widest">${c.clinicType || 'Medical Facility'}</span>
                        </div>
                    </div>
                    
                    <div class="p-12 grid grid-cols-1 md:grid-cols-2 gap-12">
                        <div>
                            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[2px] mb-8">Location & Contact</h4>
                            <div class="space-y-8">
                                <div class="flex items-start">
                                    <div class="bg-blue-50 w-10 h-10 rounded-xl flex items-center justify-center mr-4 shrink-0 shadow-sm border border-blue-100">
                                        <i class="fas fa-map-marker-alt text-blue-500"></i>
                                    </div>
                                    <div>
                                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Clinic Address</p>
                                        <p class="text-slate-700 font-bold text-sm leading-relaxed">
                                            ${c.address.street || ''}<br>
                                            ${c.address.city}, ${c.address.state} — ${c.address.zipCode || ''}
                                        </p>
                                    </div>
                                </div>
                                <div class="flex items-start">
                                    <div class="bg-blue-50 w-10 h-10 rounded-xl flex items-center justify-center mr-4 shrink-0 shadow-sm border border-blue-100">
                                        <i class="fas fa-phone text-blue-500"></i>
                                    </div>
                                    <div>
                                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Direct Line</p>
                                        <p class="text-slate-700 font-extrabold text-sm">${c.contact.phone}</p>
                                    </div>
                                </div>
                                <div class="flex items-start">
                                    <div class="bg-blue-50 w-10 h-10 rounded-xl flex items-center justify-center mr-4 shrink-0 shadow-sm border border-blue-100">
                                        <i class="fas fa-envelope text-blue-500"></i>
                                    </div>
                                    <div>
                                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Email Support</p>
                                        <p class="text-slate-700 font-bold text-sm">${c.contact.email || 'support@healthflow.pro'}</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div>
                            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[2px] mb-8">Service Operations</h4>
                            
                            <div class="mb-8">
                                <div class="flex items-center text-slate-700 bg-slate-50 p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                                    <div class="bg-white w-12 h-12 rounded-2xl shadow-sm flex items-center justify-center mr-4 shrink-0 border border-slate-50">
                                        <i class="fas fa-clock text-blue-500 text-xl"></i>
                                    </div>
                                    <div>
                                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Operating Window</p>
                                        <p class="text-base font-black text-slate-800">
                                            ${c.openingTime || '09:00 AM'} — ${c.closingTime || '08:00 PM'}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <p class="text-slate-400 text-[10px] font-bold uppercase mb-4 tracking-wider ml-1">Specialties</p>
                            <div class="flex flex-wrap gap-2 mb-8">
                                ${c.departments && c.departments.length > 0 
                                    ? c.departments.map(d => `<span class="bg-blue-50/50 text-blue-600 px-4 py-2 rounded-2xl text-[11px] font-bold border border-blue-100">${d}</span>`).join('')
                                    : '<span class="text-slate-400 text-xs italic">General Practice</span>'}
                            </div>

                            <div class="pt-6 border-t border-slate-100">
                                <div class="flex items-center text-blue-600">
                                    <i class="fas fa-info-circle mr-2 text-sm"></i>
                                    <p class="text-xs font-bold uppercase tracking-tight">
                                        ${c.appointmentRequired ? 'Prior Appointment Required' : 'Open for Walk-ins'}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-10 text-center border-t border-slate-100">
                        <button onclick="history.back()" class="bg-white border border-slate-200 text-slate-500 px-12 py-4 rounded-2xl font-bold hover:bg-blue-600 hover:text-white hover:border-blue-600 transition-all shadow-sm active:scale-95 group">
                            <i class="fas fa-arrow-left mr-2 group-hover:-translate-x-1 transition-transform"></i> 
                            BACK TO DIRECTORY
                        </button>
                    </div>
                `;
            } catch (error) {
                console.error("Initialization Error:", error);
                document.getElementById('detailsContainer').innerHTML = `
                    <div class="p-20 text-center text-red-500">
                        <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                            <i class="fas fa-exclamation-triangle text-3xl"></i>
                        </div>
                        <p class="font-extrabold text-xl tracking-tight">Facility Profile Unavailable</p>
                        <p class="text-sm text-red-400 mt-2">The requested clinic record could not be retrieved from our servers.</p>
                        <button onclick="history.back()" class="mt-8 bg-slate-800 text-white px-8 py-3 rounded-xl font-bold shadow-lg">Return to Safety</button>
                    </div>
                `;
            }
        }
        
        loadDetails();
    </script>
</body>
</html>
