<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Test History | HealthFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .sidebar-gradient { background: #0f172a; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        @media print { .no-print { display: none !important; } .ml-64 { margin-left: 0 !important; } }
    </style>
</head>
<body class="text-slate-900">
    <input type="hidden" id="patientId" th:value="${targetPatientId}">

    <aside class="sidebar-gradient fixed left-0 top-0 h-screen w-64 text-white shadow-2xl z-50">
        <div class="p-6 text-center border-b border-slate-700/50">
            <h2 class="text-xl font-bold tracking-wider text-blue-400">HEALTHFLOW <span class="text-white">PRO</span></h2>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1 font-semibold">Doctor Portal</p>
        </div>
        
        <nav class="mt-6 px-4 space-y-1">
            <a th:href="@{/doctordb}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl bg-blue-600 text-white cursor-pointer shadow-lg shadow-blue-900/20">
                <i class="fas fa-chart-line mr-3"></i> Analytics
            </a>
            <div class="pt-6 pb-2 text-[10px] font-bold text-slate-500 uppercase px-4 tracking-[2px]">Management</div>
            <a th:href="@{/clinicinfo}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-hospital mr-3 text-blue-400"></i> My Clinics
            </a>
            <a th:href="@{/patientinfo}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-users mr-3 text-blue-400"></i> Patient List
            </a>
            <a th:href="@{/medical-tests-dashboard}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-flask mr-3 text-blue-400"></i> Laboratory
            </a>
            <a th:href="@{/inventory}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-pills mr-3 text-blue-400"></i> Pharmacy
            </a>
            <div class="pt-6 pb-2 text-[10px] font-bold text-slate-500 uppercase px-4 tracking-[2px]">Settings</div>
            <a th:href="@{/my-profile}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-user-circle mr-3 text-blue-400"></i> Profile
            </a>
        </nav>
    </aside>

    <main class="ml-64 p-8">
        <header class="flex justify-between items-center mb-8 no-print">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Investigation History</h1>
                <p class="text-slate-500 text-xs mt-1">Patient ID: <span class="font-bold text-blue-600" th:text="${targetPatientId}">PAT-ID</span></p>
            </div>
            <button onclick="history.back()" class="bg-white border px-4 py-2 rounded-xl text-xs font-bold text-slate-500 hover:bg-slate-50">GO BACK</button>
        </header>

        <div id="testList" class="space-y-6 max-w-5xl mx-auto">
            <div class="py-20 text-center text-slate-400">
                <i class="fas fa-circle-notch fa-spin text-3xl mb-4"></i>
                <p>Retrieving medical records...</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const patientId = document.getElementById('patientId').value;
            try {
                // Call the filter endpoint using patientId
                const response = await fetch(`/api/medical-tests/filter?patientId=${patientId}`);
                const tests = await response.json();
                
                const container = document.getElementById('testList');
                if (tests.length === 0) {
                    container.innerHTML = `<div class="bg-white p-12 rounded-3xl text-center border-2 border-dashed border-slate-200">
                        <i class="fas fa-clipboard-list text-4xl text-slate-200 mb-4"></i>
                        <p class="text-slate-500">No medical tests found for this patient.</p>
                    </div>`;
                    return;
                }

                container.innerHTML = tests.map(test => `
                    <div class="glass-card p-8 rounded-3xl shadow-sm relative overflow-hidden" id="report-${test.id}">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <span class="bg-blue-50 text-blue-600 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">${test.category}</span>
                                <h3 class="text-xl font-bold text-slate-800 mt-3">${test.testName}</h3>
                                <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">Ref ID: ${test.id}</p>
                            </div>
                            <div class="text-right no-print">
                                <button onclick="downloadTestPDF('${test.id}')" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-xs font-bold shadow-lg hover:bg-blue-700 transition-all">
                                    <i class="fas fa-download mr-2"></i> DOWNLOAD PDF
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 py-6 border-y border-slate-100">
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Status</p>
                                <span class="text-sm font-bold ${test.resultStatus === 'Completed' ? 'text-emerald-600' : 'text-amber-500'}">${test.resultStatus}</span>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Billing Amount</p>
                                <p class="text-sm font-bold text-slate-700">₹ ${test.price.toFixed(2)}</p>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Doctor ID</p>
                                <p class="text-sm font-bold text-slate-700">${test.doctorId}</p>
                            </div>
                        </div>

                        <div class="mt-6">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Findings & History</p>
                            <p class="text-sm text-slate-600 bg-slate-50 p-4 rounded-xl italic">${test.history || 'No history recorded.'}</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        });

        async function downloadTestPDF(testId) {
            const element = document.getElementById(`report-${testId}`);
            const opt = {
                margin: 0.5,
                filename: `LabReport_${testId}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
