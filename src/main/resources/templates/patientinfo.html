<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient List | HealthFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar-gradient { background: #0f172a; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }
        .app-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .table-row:hover {
            background: rgba(241, 245, 249, 0.5);
            transform: scale(1.002);
            transition: all 0.2s ease;
        }
    </style>
</head>
<body class="app-bg text-slate-900 overflow-x-hidden">

    <input type="hidden" id="profId" th:value="${doctorId}">

    <aside class="sidebar-gradient fixed left-0 top-0 h-screen w-64 text-white shadow-2xl z-50">
        <div class="p-6 text-center border-b border-slate-700/50">
            <h2 class="text-xl font-bold tracking-wider text-blue-400">HEALTHFLOW <span class="text-white">PRO</span></h2>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1 font-semibold">Doctor Portal</p>
        </div>
        
        <nav class="mt-6 px-4 space-y-1">
            <a th:href="@{/doctordb}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl bg-blue-600 text-white cursor-pointer shadow-lg shadow-blue-900/20">
                <i class="fas fa-home mr-3"></i> Dashboard
            </a>
            <div class="pt-6 pb-2 text-[10px] font-bold text-slate-500 uppercase px-4 tracking-[2px]">Management</div>
            <a th:href="@{/clinicinfo}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-hospital mr-3 text-blue-400"></i> My Clinics
            </a>
            <a th:href="@{/patientinfo}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-users mr-3 text-blue-400"></i> Patient List
            </a>
            <a th:href="@{/medical-tests-dashboard}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-flask mr-3 text-blue-400"></i> Laboratory
            </a>
            <a th:href="@{/inventory}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-pills mr-3 text-blue-400"></i> Pharmacy
            </a>
            <div class="pt-6 pb-2 text-[10px] font-bold text-slate-500 uppercase px-4 tracking-[2px]">Settings</div>
            <a th:href="@{/my-profile}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-user-circle mr-3 text-blue-400"></i> Profile
            </a>
        </nav>
    </aside>

    <main class="ml-64 p-10 min-h-screen">
        <header class="flex justify-between items-end mb-12">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Patient Directory</h1>
                <p class="text-slate-500 text-sm mt-1">Manage and view clinical records for your assigned patients</p>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="location.href='/add-patient'" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold text-xs shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                    <i class="fas fa-plus-circle mr-2"></i> ADD NEW PATIENT
                </button>
            </div>
        </header>

        <div class="glass-card rounded-[2rem] overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/50 border-b border-slate-200">
                        <tr>
                            <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Identifier</th>
                            <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Full Patient Name</th>
                            <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Contact Information</th>
                            <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Blood Type</th>
                            <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Operations</th>
                        </tr>
                    </thead>
                    <tbody id="patientTableBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>

            <div id="statusArea" class="p-20 text-center">
                <i id="statusIcon" class="fas fa-circle-notch fa-spin text-blue-500 text-3xl mb-4"></i>
                <p id="statusText" class="text-slate-500 font-semibold tracking-tight">Synchronizing clinical data...</p>
            </div>
        </div>
    </main>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const doctorId = document.getElementById("profId")?.value;
        const tableBody = document.getElementById("patientTableBody");
        const statusArea = document.getElementById("statusArea");
        const statusText = document.getElementById("statusText");
        const statusIcon = document.getElementById("statusIcon");

        if (!doctorId || doctorId === "null" || doctorId === "") {
            statusIcon.className = "fas fa-user-lock text-rose-500 text-3xl mb-4";
            statusText.innerText = "Authorization Error. Please sign in again.";
            statusText.className = "text-rose-500 font-bold";
            return;
        }

        // Fetching patients assigned to this doctor
        fetch(`/api/patients/doctor/${doctorId}`)
            .then(response => {
                if (!response.ok) throw new Error("Network response was not ok");
                return response.json();
            })
            .then(patients => {
                if (!patients || patients.length === 0) {
                    statusIcon.className = "fas fa-folder-open text-slate-300 text-3xl mb-4";
                    statusText.innerText = "No patient records found under your care.";
                    return;
                }

                statusArea.style.display = "none";
                tableBody.innerHTML = patients.reverse().map(p => `
                    <tr class="table-row">
                        <td class="px-8 py-6">
                            <span class="bg-blue-50 text-blue-600 text-[10px] font-black px-3 py-1 rounded-full font-mono">
                                ${p.patientId}
                            </span>
                        </td>
                        <td class="px-8 py-6">
                            <div class="text-sm font-bold text-slate-800">${p.fullName}</div>
                            <div class="text-[10px] text-slate-400 font-medium uppercase tracking-tighter">${p.gender || 'Not Specified'}</div>
                        </td>
                        <td class="px-8 py-6 text-sm text-slate-600 font-medium">
                            <i class="fas fa-phone-alt text-[10px] mr-2 text-slate-300"></i>${p.phone || 'N/A'}
                        </td>
                        <td class="px-8 py-6">
                            <span class="px-3 py-1 bg-rose-50 text-rose-600 rounded-lg text-[11px] font-black">
                                ${p.bloodGroup || 'O+'}
                            </span>
                        </td>
                        <td class="px-8 py-6 text-right">
                            <div class="flex justify-end space-x-2">
                                <button onclick="prescribePatient('${p.patientId}')" 
                                    class="bg-blue-600 text-white p-2.5 rounded-xl hover:bg-blue-700 transition-all shadow-sm"
                                    title="Issue New Prescription">
                                    <i class="fas fa-stethoscope"></i>
                                </button>
                                
                                <button onclick="viewPrescriptions('${p.patientId}')" 
                                    class="bg-emerald-500 text-white p-2.5 rounded-xl hover:bg-emerald-600 transition-all shadow-sm"
                                    title="View Prescriptions">
                                    <i class="fas fa-eye"></i>
                                </button>

                                <button onclick="deletePatient('${p.id}')" 
                                    class="bg-white border border-slate-200 text-slate-600 p-2.5 rounded-xl hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200 transition-all shadow-sm"
                                    title="Delete Patient Record">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            })
            .catch(error => {
                console.error("API Error:", error);
                statusIcon.className = "fas fa-server text-rose-400 text-3xl mb-4";
                statusText.innerText = "Internal Server Error: Unable to reach medical database.";
            });
    });

    // Function to open add-prescription page with patient ID
    function prescribePatient(patientId) {
        window.location.href = "/add-prescription?patientId=" + patientId;
    }

    // Function to open prescriptioninfo.html (History)
    function viewPrescriptions(patientId) {
        const doctorId = document.getElementById("profId").value;
        // Matches the mapping in WebController.java: @GetMapping("/patient-prescriptions")
        window.location.href = `/patient-prescriptions?patientId=${patientId}&doctorId=${doctorId}`;
    }

    function deletePatient(id) {
        if(confirm("Confirm: Are you sure you want to permanently delete this record?")) {
            fetch(`/api/patients/${id}`, { method: 'DELETE' })
                .then(() => location.reload());
        }
    }
    </script>
</body>
</html>
