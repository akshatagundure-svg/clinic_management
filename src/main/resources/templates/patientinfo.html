<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Patients | HealthFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-gradient { background: #0f172a; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; }
        .app-bg {
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="app-bg text-slate-900 overflow-x-hidden">

    <input type="hidden" id="profId" th:value="${doctorId}">

    <aside class="sidebar-gradient fixed left-0 top-0 h-screen w-64 text-white shadow-2xl z-50">
        <div class="p-6 text-center border-b border-slate-700/50">
            <h2 class="text-xl font-bold tracking-wider text-blue-400">HEALTHFLOW <span class="text-white">PRO</span></h2>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1 font-semibold">Doctor Portal</p>
        </div>
        
        <nav class="mt-6 px-4 space-y-1">
            <a th:href="@{/doctordb}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl bg-blue-600 text-white cursor-pointer shadow-lg shadow-blue-900/20">
                <i class="fas fa-chart-line mr-3"></i> Analytics
            </a>
            <div class="pt-6 pb-2 text-[10px] font-bold text-slate-500 uppercase px-4 tracking-[2px]">Management</div>
            <a th:href="@{/clinicinfo}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-hospital mr-3 text-blue-400"></i> My Clinics
            </a>
            <a th:href="@{/patientinfo}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-users mr-3 text-blue-400"></i> Patient List
            </a>
            <a th:href="@{/medical-tests-dashboard}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-flask mr-3 text-blue-400"></i> Laboratory
            </a>
            <a th:href="@{/inventory}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-pills mr-3 text-blue-400"></i> Pharmacy
            </a>
            <div class="pt-6 pb-2 text-[10px] font-bold text-slate-500 uppercase px-4 tracking-[2px]">Settings</div>
            <a th:href="@{/my-profile}" class="flex items-center px-4 py-3 text-sm font-medium rounded-xl text-slate-300 hover:bg-slate-800 transition-all group">
                <i class="fas fa-user-circle mr-3 text-blue-400"></i> Profile
            </a>
        </nav>
    </aside>

    <main class="ml-64 p-8 min-h-screen">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">My Patients</h1>
                <p class="text-slate-500 text-xs mt-1">Manage patients registered under your clinical care</p>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="location.href='/add-patient'" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-xs shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                    <i class="fas fa-plus mr-2"></i> ADD PATIENT
                </button>
            </div>
        </header>

        <div class="glass-card rounded-3xl overflow-hidden shadow-sm border border-slate-200">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Patient ID</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Full Name</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Contact</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Blood Group</th>
                        <th class="px-6 py-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="patientTableBody" class="divide-y divide-slate-100"></tbody>
            </table>
            
            <div id="tableLoader" class="p-20 text-center">
                <i class="fas fa-circle-notch fa-spin text-blue-500 text-2xl mb-3"></i>
                <p class="text-slate-400 text-sm font-medium">Fetching your patient records...</p>
            </div>
        </div>
    </main>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const doctorId = document.getElementById("profId")?.value;
        const tableBody = document.getElementById("patientTableBody");
        const loader = document.getElementById("tableLoader");

        if (!doctorId) {
            loader.innerHTML = "<p class='text-red-500'>Doctor ID not found</p>";
            return;
        }

        // Fetch patients for this doctor
        fetch("/api/patients/doctor/" + doctorId)
            .then(response => {
                if (!response.ok) throw new Error("Failed to fetch patients");
                return response.json();
            })
            .then(patients => {
                loader.style.display = "none";
                if (!patients || patients.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-slate-400">No patients found</td></tr>`;
                    return;
                }

                patients.forEach(patient => {
                    const row = `
                        <tr class="hover:bg-slate-50 transition">
                            <td class="px-6 py-4 text-xs font-mono font-bold text-indigo-600">${patient.patientId}</td>
                            <td class="px-6 py-4 text-sm font-bold text-slate-700">${patient.fullName}</td>
                            <td class="px-6 py-4 text-sm text-slate-600">${patient.phone}</td>
                            <td class="px-6 py-4 text-sm">
                                <span class="px-2 py-1 bg-red-50 text-red-600 rounded text-xs font-bold">${patient.bloodGroup || '-'}</span>
                            </td>
                            <td class="px-6 py-4 text-right space-x-2">
                                <button onclick="viewHistory('${patient.patientId}')"
                                        class="text-slate-500 border border-slate-200 px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase hover:bg-slate-100 transition-all">
                                    <i class="fas fa-history mr-1"></i> History
                                </button>
                                <button onclick="prescribePatient('${patient.patientId}')"
                                        class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase shadow-md hover:bg-blue-700 transition-all">
                                    <i class="fas fa-file-medical mr-1"></i> Prescribe
                                </button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            })
            .catch(error => {
                console.error("Error:", error);
                loader.innerHTML = "<p class='text-red-500 text-sm'>Error loading patients</p>";
            });
    });

    /**
     * Updated Function to view clinical history.
     * Passes BOTH patientId and doctorId to satisfy the backend controller's requirements.
     */
    function viewHistory(patientId) {
        // 1. Get the doctorId from the hidden input field
        const doctorId = document.getElementById("profId").value;
        
        // 2. Redirect with both query parameters
        window.location.href = `/patient-prescriptions?patientId=${patientId}&doctorId=${doctorId}`;
    }

    function prescribePatient(patientId) {
        window.location.href = "/add-prescription?patientId=" + patientId;
    }
    </script>
</body>
</html>
