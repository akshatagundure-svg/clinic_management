<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal | HealthFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .sidebar-gradient { background: #0f172a; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; transition: all 0.3s ease; cursor: pointer; }
        .glass-card:hover { transform: translateY(-4px); border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .app-bg { background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px); background-size: 24px 24px; }
    </style>
</head>
<body class="app-bg text-slate-900 overflow-x-hidden">
    <input type="hidden" id="sessPatientId" th:value="${patientId}">

    <aside class="sidebar-gradient fixed left-0 top-0 h-screen w-64 text-white z-50">
        <div class="p-6 text-center border-b border-slate-700/50">
            <h2 class="text-xl font-bold text-blue-400">HEALTHFLOW <span class="text-white">PRO</span></h2>
        </div>
        <nav class="mt-6 px-4 space-y-2">
            <button onclick="switchTab('clinics')" class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all text-left">
                <i class="fas fa-hospital mr-3 text-blue-400 w-5"></i> Clinics
            </button>
            
            <button onclick="switchTab('doctors')" class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all text-left">
                <i class="fas fa-user-md mr-3 text-blue-400 w-5"></i> Doctors
            </button>
            
            <button onclick="switchTab('prescriptions')" class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all text-left">
                <i class="fas fa-file-prescription mr-3 text-blue-400 w-5"></i> Prescriptions
            </button>

            <button onclick="switchTab('tests')" class="w-full flex items-center px-4 py-3 text-sm rounded-xl hover:bg-slate-800 transition-all text-left">
                <i class="fas fa-microscope mr-3 text-blue-400 w-5"></i> Lab Tests
            </button>
        </nav>
    </aside>

    <main class="ml-64 p-10 min-h-screen">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-2xl shadow-sm border border-slate-200/50">
            <h1 class="text-2xl font-bold">Welcome, <span th:text="${patientName}">User</span></h1>
            <button onclick="location.href='/login'" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-bold text-xs hover:bg-red-100 transition-colors">LOGOUT</button>
        </header>

        <div id="displayArea" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-20 bg-white/50 rounded-3xl border border-dashed border-slate-300">
                <i class="fas fa-hand-holding-medical text-4xl text-blue-200 mb-4"></i>
                <p class="text-slate-400 font-medium">Please select a category from the sidebar to view information.</p>
            </div>
        </div>
    </main>

    <script>
        const pId = document.getElementById('sessPatientId').value;

        async function switchTab(type) {
            // REDIRECTS to dedicated full pages
            if(type === 'prescriptions') {
                location.href = '/patient/my-prescriptions';
                return;
            }

            if(type === 'clinics') {
                location.href = '/patient/clinics';
                return;
            }

            if(type === 'doctors') {
                location.href = '/patient/doctors';
                return;
            }

            // REDIRECT to the new Lab Tests page
            if(type === 'tests') {
                location.href = `/patient/my-lab-tests?patientId=${pId}`;
                return;
            }
        }

        // Logic to automatically handle tab selection if needed
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const tab = params.get('tab');
            if (tab) switchTab(tab);
        };
    </script>
    <a href="/ai" target="_blank" class="fixed bottom-8 right-8 w-16 h-16 rounded-full bg-gradient-to-r from-blue-400 to-emerald-400 text-white flex items-center justify-center shadow-xl shadow-blue-500/30 hover:shadow-emerald-500/40 hover:scale-110 transition-all duration-300 z-50 group cursor-pointer border-2 border-white">
        <i class="fa-solid fa-wand-magic-sparkles text-2xl group-hover:rotate-12 transition-transform"></i>
        <span class="absolute top-0 right-0 flex h-4 w-4">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
            <span class="relative inline-flex rounded-full h-4 w-4 bg-emerald-300 border-2 border-white"></span>
        </span>
        </a>
</body>
</html>
